<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷ビュー — OYAA 3DCG教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#0d2340;--p1a:#5fa0e0;
  --bg:#f0ede6;--card:#faf8f2;--border:#e0dbd0;
  --sans:'Noto Sans JP',sans-serif;--mono:'Space Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg);color:#1a1a1a;padding:24px 20px 60px;}
.top-header{max-width:720px;margin:0 auto 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.top-title{font-family:var(--mono);font-size:12px;color:var(--p1);letter-spacing:.12em;text-transform:uppercase;}
.print-btn{font-family:var(--mono);font-size:11px;background:var(--p1);color:#fff;border:none;border-radius:4px;padding:9px 20px;cursor:pointer;letter-spacing:.08em;transition:background .15s;}
.print-btn:hover{background:#1a3a5a;}
.selector{max-width:720px;margin:0 auto 16px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px 18px;}
.sec-label{font-family:var(--mono);font-size:9px;color:#aaa;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;margin-top:14px;}
.sec-label:first-child{margin-top:0;}
.core-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:4px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .12s;width:100%;margin-bottom:4px;}
.core-btn:hover{border-color:var(--p1a);}
.core-btn.selected{border-color:var(--p1);background:#e8f0fa;}
.core-btn-icon{font-size:18px;}
.core-btn-info{font-size:12px;font-weight:700;color:#444;flex:1;}
.core-btn-meta{font-family:var(--mono);font-size:9px;color:#aaa;}
.sess-grid,.know-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
.item-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:4px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .12s;user-select:none;}
.item-btn:hover{border-color:var(--p1a);}
.item-btn.selected{border-color:var(--p1);background:#e8f0fa;}
.item-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--p1);}
.item-date{font-family:var(--mono);font-size:8px;color:#aaa;}
.item-name{font-size:10px;font-weight:700;text-align:center;color:#444;line-height:1.3;}
.face-opts{display:flex;gap:6px;margin-bottom:12px;}
.face-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1.5px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;transition:all .12s;}
.face-btn:hover{border-color:var(--p1a);}
.face-btn.selected{border-color:var(--p1);background:#e8f0fa;color:var(--p1);}
.hint{max-width:720px;margin:0 auto 16px;font-family:var(--mono);font-size:9px;color:#aaa;letter-spacing:.06em;}
</style>
</head>
<body>

<div class="top-header">
  <div class="top-title">🖨️ 印刷ビュー</div>
  <button class="print-btn" onclick="doPrint()">印刷する</button>
</div>

<div class="selector">

  <div class="sec-label">📖 コアシート</div>
  <div class="core-btn" id="core-btn" onclick="toggleCore()">
    <div class="core-btn-icon">📖</div>
    <div class="core-btn-info">コアシート（P01–P04）</div>
    <div class="core-btn-meta">第1回配布 · 全ページ出力</div>
  </div>

  <div class="sec-label">📄 チャプターシート</div>
  <div class="face-opts">
    <div class="face-btn selected" id="face-both"  onclick="setFace('both')">表面 ＋ 裏面</div>
    <div class="face-btn"          id="face-front" onclick="setFace('front')">表面のみ（4枚/A4）</div>
    <div class="face-btn"          id="face-back"  onclick="setFace('back')">裏面のみ（4枚/A4）</div>
  </div>
  <div class="sess-grid" id="sess-grid"></div>

  <div class="sec-label">📘 ナレッジシート K01（ページ選択）</div>
  <div class="know-grid" id="know-grid"></div>

</div>

<div class="hint" id="hint">印刷したいシートを選んでください。</div>

<script>
const BASE = window.location.origin + window.location.pathname.replace(/\/[^/]*$/,'/');

const SESSIONS = [
  {n:1,date:'4/5', name:'ドーナツをつくろう'},
  {n:2,date:'4/12',name:'リッチドーナツ'},
  {n:3,date:'5/10',name:'ちびキャラ'},
  {n:4,date:'5/17',name:'ポスター完成'},
  {n:5,date:'6/7', name:'オリカデザイン'},
  {n:6,date:'6/14',name:'デジタルカード'},
  {n:7,date:'7/5', name:'飛び出すカード'},
  {n:8,date:'7/12',name:'発表・修了'},
];

const K01_PAGES = [
  {id:0,label:'A▲',name:'3DCGとは'},
  {id:1,label:'A▼',name:'制作の流れ'},
  {id:2,label:'B▲',name:'モデリング手法'},
  {id:3,label:'B▼',name:'データ構造①'},
  {id:4,label:'C▲',name:'データ構造②'},
  {id:5,label:'C▼',name:'スカルプト'},
  {id:6,label:'D▲',name:'ソフト'},
  {id:7,label:'D▼',name:'用語集'},
];

let coreSelected = false;
let faceMode = 'both';
let selectedSessions = new Set();
let selectedKnowledge = new Set();

// ボタン生成
const sessGrid = document.getElementById('sess-grid');
SESSIONS.forEach(s => {
  const btn = document.createElement('div');
  btn.className = 'item-btn';
  btn.innerHTML = `<div class="item-num">S0${s.n}</div><div class="item-date">${s.date}</div><div class="item-name">${s.name}</div>`;
  btn.addEventListener('click', () => {
    if(selectedSessions.has(s.n)){selectedSessions.delete(s.n);btn.classList.remove('selected');}
    else{selectedSessions.add(s.n);btn.classList.add('selected');}
    updateHint();
  });
  sessGrid.appendChild(btn);
});

const knowGrid = document.getElementById('know-grid');
K01_PAGES.forEach(p => {
  const btn = document.createElement('div');
  btn.className = 'item-btn';
  btn.innerHTML = `<div class="item-num">${p.label}</div><div class="item-name">${p.name}</div>`;
  btn.addEventListener('click', () => {
    if(selectedKnowledge.has(p.id)){selectedKnowledge.delete(p.id);btn.classList.remove('selected');}
    else{selectedKnowledge.add(p.id);btn.classList.add('selected');}
    updateHint();
  });
  knowGrid.appendChild(btn);
});

function toggleCore(){
  coreSelected=!coreSelected;
  document.getElementById('core-btn').classList.toggle('selected',coreSelected);
  updateHint();
}
function setFace(mode){
  faceMode=mode;
  ['both','front','back'].forEach(m=>document.getElementById('face-'+m).classList.toggle('selected',m===mode));
  updateHint();
}
function updateHint(){
  const parts=[];
  if(coreSelected) parts.push('コアシート');
  if(selectedSessions.size>0) parts.push(`チャプターシート ${selectedSessions.size}回分`);
  if(selectedKnowledge.size>0) parts.push(`ナレッジシート ${selectedKnowledge.size}ページ`);
  document.getElementById('hint').textContent = parts.length>0 ? `選択中：${parts.join('、')}` : '印刷したいシートを選んでください。';
}

// 相対URLを絶対URLに変換
function resolveUrls(html, baseUrl){
  return html
    .replace(/(src|href)="(?!https?:\/\/|data:|#)([^"]+)"/g, (match, attr, path) => {
      try{
        const abs = new URL(path, baseUrl).href;
        return `${attr}="${abs}"`;
      }catch(e){ return match; }
    });
}

async function fetchHtml(path){
  const url = BASE + path;
  const res = await fetch(url);
  const html = await res.text();
  return resolveUrls(html, url);
}

// カードラップ用スタイル
const wrapStyle = `
  .card-wrap{
    width:359px;height:643px;flex-shrink:0;
    transform:scale(0.78);transform-origin:center center;
  }
  .nav,.page-label,.divider{display:none!important;}
`;

const a4Style = `
  .a4-page{
    width:210mm;height:297mm;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
    page-break-after:always;overflow:hidden;background:#fff;
  }
  .a4-page.single{grid-template-columns:1fr;grid-template-rows:1fr;}
  .a4-cell{display:flex;align-items:center;justify-content:center;overflow:hidden;}
  @page{size:A4 portrait;margin:5mm;}
`;

async function doPrint(){
  if(!coreSelected && selectedSessions.size===0 && selectedKnowledge.size===0){
    alert('印刷するシートを選んでください。');return;
  }

  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;}${a4Style}</style>
  </head><body>`);

  // ── コアシート ──
  if(coreSelected){
    const html = await fetchHtml('passport/passport_core.html');
    const parser = new DOMParser();
    const doc = parser.parseFromString(html,'text/html');
    const style = doc.querySelector('style')?.innerHTML||'';
    const pages = doc.querySelectorAll('.page');

    // 各ページを個別A4に（2ページずつまとめる場合は調整可）
    pages.forEach(page => {
      // .activeクラスを強制付与
      page.classList.add('active');
      w.document.write(`
        <div class="a4-page single">
          <div class="a4-cell">
            <div class="card-wrap" style="transform:scale(0.78);transform-origin:center center;width:359px;height:643px;flex-shrink:0;">
              <style>${style}${wrapStyle}.page{display:none!important;}.page.active{display:flex!important;flex-direction:column;align-items:center;}</style>
              ${page.outerHTML}
            </div>
          </div>
        </div>
      `);
    });
  }

  // ── チャプターシート ──
  if(selectedSessions.size>0){
    const html = await fetchHtml('passport/passport_sheets.html');
    const parser = new DOMParser();
    const doc = parser.parseFromString(html,'text/html');
    const style = doc.querySelector('style')?.innerHTML||'';
    const allSessions = doc.querySelectorAll('.session');
    const sessions = [...selectedSessions].sort((a,b)=>a-b);

    function cardCell(cardEl){
      if(!cardEl) return `<div class="a4-cell"></div>`;
      return `<div class="a4-cell">
        <div style="transform:scale(0.78);transform-origin:center center;width:359px;height:643px;flex-shrink:0;">
          <style>${style}${wrapStyle}</style>
          ${cardEl.outerHTML}
        </div>
      </div>`;
    }

    if(faceMode==='both'){
      for(let i=0;i<sessions.length;i+=2){
        const group=sessions.slice(i,i+2);
        let cells='';
        group.forEach(n=>{
          const s=allSessions[n-1];
          cells+=cardCell(s?.querySelector('.front'));
          cells+=cardCell(s?.querySelector('.back'));
        });
        if(group.length===1){cells+=`<div class="a4-cell"></div><div class="a4-cell"></div>`;}
        w.document.write(`<div class="a4-page">${cells}</div>`);
      }
    } else {
      const sel = faceMode==='front' ? '.front' : '.back';
      for(let i=0;i<sessions.length;i+=4){
        const group=sessions.slice(i,i+4);
        let cells='';
        group.forEach(n=>{ cells+=cardCell(allSessions[n-1]?.querySelector(sel)); });
        while((cells.match(/a4-cell/g)||[]).length/2 < 4) cells+=`<div class="a4-cell"></div>`;
        w.document.write(`<div class="a4-page">${cells}</div>`);
      }
    }
  }

  // ── ナレッジシート ──
  if(selectedKnowledge.size>0){
    const html = await fetchHtml('passport/knowledge/k01.html');
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');
    const style=doc.querySelector('style')?.innerHTML||'';
    const allPages=[...doc.querySelectorAll('.page')];
    const selected=[...selectedKnowledge].sort((a,b)=>a-b);

    for(let i=0;i<selected.length;i+=4){
      const group=selected.slice(i,i+4);
      let cells='';
      group.forEach(idx=>{
        const page=allPages[idx];
        const card=page?.querySelector('.card');
        if(card){
          cells+=`<div class="a4-cell">
            <div style="transform:scale(0.78);transform-origin:center center;width:359px;height:643px;flex-shrink:0;">
              <style>${style}${wrapStyle}</style>
              ${card.outerHTML}
            </div>
          </div>`;
        } else {
          cells+=`<div class="a4-cell"></div>`;
        }
      });
      while((cells.match(/a4-cell/g)||[]).length/2 < 4) cells+=`<div class="a4-cell"></div>`;
      w.document.write(`<div class="a4-page">${cells}</div>`);
    }
  }

  w.document.write('</body></html>');
  w.document.close();
  setTimeout(()=>{w.focus();w.print();},1200);
}
</script>
</body>
</html>
